<!-- [第二部分 JS] 情绪水母挂件交互逻辑 -->
<script>
// ============================================================
//  情绪雾点挂件 (Mist Widget) — 完整交互逻辑
// ============================================================
(function () {
    'use strict';

    /* ---------- DOM 引用 ---------- */
    const widget   = document.getElementById('mistWidget');
    const popover  = document.getElementById('mistPopover');
    const quoteEl  = document.getElementById('mistQuote');
    const sheet    = document.getElementById('mistSheet');
    const sheetOverlay = document.getElementById('mistSheetOverlay');
    const sheetHandle  = document.getElementById('mistSheetHandle');

    if (!widget) return;   // 安全守卫

    const isMobile = window.matchMedia('(max-width: 768px)').matches;

    /* ---------- 拖拽功能 ---------- */
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let widgetStartX = 0, widgetStartY = 0;
    let hasMoved = false;

    function getWidgetPos() {
        const rect = widget.getBoundingClientRect();
        return { x: rect.left, y: rect.top };
    }

    function onDragStart(e) {
        const point = e.touches ? e.touches[0] : e;
        const pos = getWidgetPos();
        dragStartX = point.clientX;
        dragStartY = point.clientY;
        widgetStartX = pos.x;
        widgetStartY = pos.y;
        hasMoved = false;
        document.addEventListener(e.touches ? 'touchmove' : 'mousemove', onDragMove);
        document.addEventListener(e.touches ? 'touchend' : 'mouseup', onDragEnd);
    }

    function onDragMove(e) {
        const point = e.touches ? e.touches[0] : e;
        const dx = point.clientX - dragStartX;
        const dy = point.clientY - dragStartY;
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            if (!isDragging) {
                isDragging = true;
                widget.classList.add('dragging');
                // 切换为 left/top 定位
                widget.style.right = 'auto';
                widget.style.bottom = 'auto';
            }
        }
        if (isDragging) {
            const newX = widgetStartX + dx;
            const newY = widgetStartY + dy;
            // 边界限制
            const maxX = window.innerWidth - widget.offsetWidth - 4;
            const maxY = window.innerHeight - widget.offsetHeight - 4;
            widget.style.left = Math.max(4, Math.min(newX, maxX)) + 'px';
            widget.style.top = Math.max(4, Math.min(newY, maxY)) + 'px';
            hasMoved = true;
            if (e.cancelable) e.preventDefault();
        }
    }

    function onDragEnd(e) {
        document.removeEventListener(e.touches ? 'touchmove' : 'mousemove', onDragMove);
        document.removeEventListener(e.touches ? 'touchend' : 'mouseup', onDragEnd);
        if (isDragging) {
            isDragging = false;
            widget.classList.remove('dragging');
        }
    }

    // 绑定拖拽（mousedown/touchstart）
    widget.addEventListener('mousedown', onDragStart);
    widget.addEventListener('touchstart', onDragStart, { passive: true });

    /* ---------- 心理短句池（随机轮换）---------- */
    const quotes = [
        '此刻，允许自己只是存在。',
        '每一次呼吸都是新的开始。',
        '你的感受是真实且合理的。',
        '温柔地对待自己，就像对待好朋友一样。',
        '不需要每时每刻都坚强。',
        '情绪像天气，来去都是自然的。',
        '你已经做得很好了。',
        '深呼吸，这里很安全。',
        '此刻的疲惫，是在提醒你需要休息。',
        '接纳不完美，才是真正的勇敢。'
    ];

    /* ---------- 工具函数 ---------- */
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    /** 检测 backdrop-filter 支持 */
    const supportsBackdrop = CSS.supports && (
        CSS.supports('backdrop-filter', 'blur(1px)') ||
        CSS.supports('-webkit-backdrop-filter', 'blur(1px)')
    );

    /** 降级：不支持毛玻璃则用纯色 */
    if (!supportsBackdrop) {
        widget.style.background = 'rgba(255, 253, 249, 0.95)';
        popover.style.background = 'rgba(255, 253, 249, 0.95)';
        sheet.style.background = 'rgba(255, 253, 249, 0.97)';
    }


    /* ===========================================================
       PC 端交互
    =========================================================== */
    if (!isMobile) {

        // --- 悬停：暂停呼吸 + 放大 + 显示提示 ---
        let hoverTimer = null;
        widget.addEventListener('mouseenter', () => {
            widget.style.animationPlayState = 'paused';
            widget.classList.add('hovered');
            hoverTimer = setTimeout(() => {
                widget.querySelector('.mist-hint')?.classList.add('visible');
            }, 400);   // 等 scale 过渡完成再显示文字，避免跳动
        });

        widget.addEventListener('mouseleave', () => {
            widget.style.animationPlayState = 'running';
            widget.classList.remove('hovered');
            clearTimeout(hoverTimer);
            widget.querySelector('.mist-hint')?.classList.remove('visible');
            // 如果弹窗开着且鼠标离开，不自动关闭（用户可能移到卡片上操作）
        });

        // --- 点击：展开/收起小卡片 ---
        let popoverOpen = false;

        widget.addEventListener('click', (e) => {
            e.stopPropagation();
            if (hasMoved) { hasMoved = false; return; }  // 拖拽后不触发点击
            if (popoverOpen) return;   // 已展开则忽略重复点击（通过收起按钮关闭）
            popoverOpen = true;
            quoteEl.textContent = pick(quotes);
            popover.classList.add('show');
        });

        // 点击选项 → 收起卡片 + 羽毛反馈
        popover.querySelectorAll('.mist-opt').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                popoverOpen = false;
                popover.classList.remove('show');
                showFeather();
            });
        });

        // 点页面其他区域也关闭
        document.addEventListener('click', (e) => {
            if (popoverOpen && !popover.contains(e.target)) {
                popoverOpen = false;
                popover.classList.remove('show');
            }
        });
    }


    /* ===========================================================
       移动端交互 — 底部滑出面板
    =========================================================== */
    else {
        let sheetOpen = false;

        widget.addEventListener('click', (e) => {
            e.stopPropagation();
            if (hasMoved) { hasMoved = false; return; }  // 拖拽后不触发点击
            if (sheetOpen) return;
            openSheet();
        });

        function openSheet() {
            sheetOpen = true;
            sheet.classList.add('up');
            sheetOverlay.classList.add('visible');
            document.body.style.overflow = 'hidden';   // 阻止滚动穿透
            wake();                                    // 触碰即唤醒
        }

        function closeSheet() {
            sheetOpen = false;
            sheet.classList.remove('up');
            sheetOverlay.classList.remove('visible');
            document.body.style.overflow = '';
        }

        // 点击遮罩层关闭
        sheetOverlay.addEventListener('click', closeSheet);

        // 下拉手势线关闭（touchmove 向下 > 30px）
        let touchStartY = 0;
        sheetHandle.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        sheetHandle.addEventListener('touchmove', (e) => {
            const dy = e.touches[0].clientY - touchStartY;
            if (dy > 30) closeSheet();
        }, { passive: true });

        // 选项点击
        sheet.querySelectorAll('.mist-sheet-opt').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                closeSheet();
                showFeather();
            });
        });
    }


    /* ===========================================================
       羽毛反馈动画（PC / 移动端共用）
       选中情绪后短暂显示羽毛图标，1.5 秒后淡出
    =========================================================== */
    function showFeather() {
        const feather = document.createElement('div');
        feather.className = 'mist-feather';
        feather.innerHTML = '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14l-4-4 1.41-1.41L11 13.17V7h2v6.17l2.59-2.58L17 16l-6 6z" fill="#A3B5BF" opacity="0"/></svg>';   // 羽毛 SVG 路径
        // 用更柔和的羽毛形 SVG 替代
        feather.innerHTML = '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0 2px 6px rgba(163,181,191,0.3));"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z" transform="rotate(-30 12 12)" fill="#A3B5BF"/><path d="M19 17l-6 6-1.5-1.5L17 16z" opacity=".35" fill="#A3B5BF"/></svg>';
        widget.appendChild(feather);
        // 触发 reflow 以启动 CSS 动画
        void feather.offsetWidth;
        feather.classList.add('show');
        setTimeout(() => feather.remove(), 1500);
    }


    /* ===========================================================
       休眠策略（仅移动端）
       10 秒无操作 → 透明度降至 0.4 + 呼吸变缓
       触碰屏幕任意位置 → 立即恢复活跃
    =========================================================== */
    if (isMobile) {
        const IDLE_TIMEOUT = 10000;     // 10 秒
        const SLOW_DUR = '8s';          // 休眠呼吸周期
        const FAST_DUR = '3.5s';        // 活跃呼吸周期

        let idleTimer = null;

        function startIdleTimer() {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(goIdle, IDLE_TIMEOUT);
        }

        function goIdle() {
            widget.style.opacity = '0.4';
            widget.style.setProperty('--breath-dur', SLOW_DUR);
        }

        function wake() {
            clearTimeout(idleTimer);
            widget.style.opacity = '';
            widget.style.setProperty('--breath-dur', FAST_DUR);
            startIdleTimer();
        }

        // 全局触碰监听
        document.addEventListener('touchstart', wake, { passive: true });
        // 初始启动计时器
        startIdleTimer();
    }



})();
</script>
