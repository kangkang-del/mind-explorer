[build]
  publish = "."
  functions = "netlify/functions"

# API 请求代理到 Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# HTML 文件不缓存，确保用户总是看到最新版本
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# JS/CSS 文件缓存 7 天（加了版本号，更新时会变）
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"
