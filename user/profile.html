<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>我的主页 — 心灵探索</title>
<link rel="stylesheet" href="/css/style.css">
<script src="/js/auth.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-brand">🧠 心灵探索</a>
        <div class="nav-links">
            <a href="/" class="nav-link">首页</a>
            <a href="/study/" class="nav-link">知识</a>
            <a href="/health/" class="nav-link">心理健康</a>
            <a href="/theorists/" class="nav-link">心理学家</a>
        </div>
    </div>
</nav>

<main class="user-page">
    <div class="login-prompt" id="login-prompt">
        <h1>🔑 请先登录</h1>
        <p>登录后才能查看个人主页</p>
        <a href="#" class="login-btn" onclick="Auth.login()">使用 GitHub 登录</a>
    </div>

    <div id="profile-content" style="display:none;">
        <div class="user-header">
            <img id="profile-avatar" src="" alt="头像">
            <h1 id="profile-name"></h1>
            <p id="profile-username" style="color:var(--text-light);"></p>
            <div class="user-stats">
                <div class="user-stat">
                    <div class="user-stat-value" id="stat-points">0</div>
                    <div class="user-stat-label">贡献积分</div>
                </div>
                <div class="user-stat">
                    <div class="user-stat-value" id="stat-uploads">0</div>
                    <div class="user-stat-label">上传内容</div>
                </div>
                <div class="user-stat">
                    <div class="user-stat-value" id="stat-likes">0</div>
                    <div class="user-stat-label">获得认同</div>
                </div>
            </div>
        </div>

        <div class="user-content-section">
            <h2>📤 我上传的内容</h2>
            <div id="my-uploads">
                <p style="color:var(--text-light);text-align:center;padding:20px;">暂无上传内容，<a href="/user/upload.html">去上传</a></p>
            </div>
        </div>

        <div class="user-content-section">
            <h2>💬 我的评论</h2>
            <div id="my-comments">
                <p style="color:var(--text-light);text-align:center;padding:20px;">暂无评论</p>
            </div>
        </div>
    </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const user = Auth.getUser();
    const prompt = document.getElementById('login-prompt');
    const content = document.getElementById('profile-content');

    if (!user) {
        prompt.style.display = 'block';
        content.style.display = 'none';
        return;
    }

    // 显示用户内容
    prompt.style.display = 'none';
    content.style.display = 'block';

    // 填充用户信息
    document.getElementById('profile-avatar').src = user.avatar;
    document.getElementById('profile-name').textContent = user.name;
    document.getElementById('profile-username').textContent = '@' + user.username;

    // 获取积分
    Auth.fetchPoints().then(() => {
        const pointsEl = document.getElementById('nav-points');
        if (pointsEl) {
            const points = parseInt(pointsEl.textContent.replace('⭐ ', '')) || 0;
            document.getElementById('stat-points').textContent = points;
        }
    });
});
</script>
</body>
</html>
