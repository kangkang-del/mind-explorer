<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>贡献榜 — 心灵探索</title>
<link rel="stylesheet" href="/css/style.css">
<script src="/js/auth.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-brand">🧠 心灵探索</a>
        <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('active')" aria-label="菜单">☰</button>
        <div class="nav-links">
            <a href="/" class="nav-link">首页</a>
            <a href="/study/" class="nav-link">知识</a>
            <a href="/health/" class="nav-link">心理健康</a>
            <a href="/theorists/" class="nav-link">心理学家</a>
        </div>
    </div>
</nav>

<main class="user-page">
    <div class="login-prompt" id="login-prompt">
        <h1>🔑 请先登录</h1>
        <p>登录后才能查看贡献榜</p>
        <a href="#" class="login-btn" onclick="Auth.login()">使用 GitHub 登录</a>
    </div>

    <div id="points-content" style="display:none;">
        <div class="user-header">
            <h1>🏆 贡献榜</h1>
            <p>上传内容、认同知识卡片，积累贡献值，成为社区活跃贡献者！</p>
        </div>

        <!-- 贡献值规则说明 -->
        <div class="user-content-section">
            <h2>📋 贡献规则</h2>
            <table style="width:100%;border-collapse:collapse;">
                <tr style="background:#f8fafc;">
                    <th style="padding:12px;text-align:left;border-bottom:2px solid var(--border);">行为</th>
                    <th style="padding:12px;text-align:right;border-bottom:2px solid var(--border);">获得贡献值</th>
                </tr>
                <tr>
                    <td style="padding:12px;border-bottom:1px solid var(--border);">📤 上传文件（照片/视频/文件）</td>
                    <td style="padding:12px;border-bottom:1px solid var(--border);text-align:right;font-weight:700;color:var(--primary);">+5 贡献值</td>
                </tr>
                <tr>
                    <td style="padding:12px;border-bottom:1px solid var(--border);">📝 发布文章</td>
                    <td style="padding:12px;border-bottom:1px solid var(--border);text-align:right;font-weight:700;color:var(--primary);">+5 贡献值</td>
                </tr>
                <tr>
                    <td style="padding:12px;border-bottom:1px solid var(--border);">❤️ 认同知识卡片</td>
                    <td style="padding:12px;border-bottom:1px solid var(--border);text-align:right;font-weight:700;color:#d97706;">+0.1 贡献值</td>
                </tr>
            </table>
        </div>

        <!-- 我的贡献值 -->
        <div class="user-content-section" style="text-align:center;background:linear-gradient(135deg,#fef3c7,#fde68a);">
            <h2>我的贡献值</h2>
            <div style="font-size:4rem;font-weight:700;color:#d97706;" id="my-points">--</div>
            <p style="color:#92400e;">继续贡献，让更多人了解心理学知识！</p>
        </div>

        <!-- 贡献榜排行 -->
        <div class="user-content-section">
            <h2>🏅 贡献排行榜</h2>
            <table class="leaderboard-table" id="leaderboard-table">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>用户</th>
                        <th style="text-align:right;">积分</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr>
                        <td colspan="3" style="text-align:center;color:var(--text-light);padding:40px;">
                            加载中...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const user = Auth.getUser();
    if (!user) {
        document.getElementById('login-prompt').style.display = 'block';
        document.getElementById('points-content').style.display = 'none';
        return;
    }
    document.getElementById('login-prompt').style.display = 'none';
    document.getElementById('points-content').style.display = 'block';

    // 显示我的贡献值
    Auth.fetchPoints().then(() => {
        const pointsEl = document.getElementById('nav-points');
        if (pointsEl) {
            const points = parseFloat(pointsEl.textContent.replace('⭐ ', '')) || 0;
            // 贡献值显示一位小数
            document.getElementById('my-points').textContent = Number(points).toFixed(1);
        }
    });

    // 加载贡献榜
    loadLeaderboard();
});

// 加载贡献榜（通过后端 API 代理，避免暴露 token）
async function loadLeaderboard() {
    const tbody = document.getElementById('leaderboard-body');
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--text-light);padding:40px;">正在加载贡献榜...</td></tr>';

    try {
        // 通过后端 Netlify Function 获取，不直接调用 GitHub API
        const res = await fetch('/.netlify/functions/user-points?action=leaderboard');

        if (!res.ok) throw new Error('获取失败');

        const data = await res.json();

        if (data.error && !data.contributors) {
            throw new Error(data.error);
        }

        const contributors = data.contributors || [];

        tbody.innerHTML = '';

        if (contributors.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--text-light);padding:40px;">暂无贡献记录，成为第一个贡献者吧！</td></tr>';
            return;
        }

        contributors.forEach((u, i) => {
            const rankClass = i < 3 ? `top${i+1}` : '';
            tbody.innerHTML += `
                <tr>
                    <td class="leaderboard-rank ${rankClass}">#${i + 1}</td>
                    <td>
                        <img class="leaderboard-avatar" src="${u.avatar}" alt="${u.name}"
                             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>👤</text></svg>'">
                        <span class="leaderboard-name">${u.name}</span>
                    </td>
                    <td class="leaderboard-points" style="text-align:right;">${Number(u.points).toFixed(1)}</td>
                </tr>
            `;
        });

        // 添加当前用户（如果在榜外）
        if (user) {
            const myIndex = contributors.findIndex(c => c.username === user.username);
            if (myIndex === -1) {
                const myPointsEl = document.getElementById('nav-points');
                const myPoints = myPointsEl ? parseFloat(myPointsEl.textContent.replace('⭐ ', '')) || 0 : 0;
                tbody.innerHTML += `
                    <tr style="background:#fef3c7;">
                        <td class="leaderboard-rank">--</td>
                        <td>
                            <img class="leaderboard-avatar" src="${user.avatar}" alt="${user.name}"
                                 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>👤</text></svg>'">
                            <span class="leaderboard-name">${user.name}（我）</span>
                        </td>
                        <td class="leaderboard-points" style="text-align:right;">${Number(myPoints).toFixed(1)}</td>
                    </tr>
                `;
            } else {
                // 高亮当前用户行
                const rows = tbody.querySelectorAll('tr');
                if (rows[myIndex]) {
                    rows[myIndex].style.background = '#f0fdf4';
                }
            }
        }

    } catch (err) {
        console.error('加载贡献榜失败:', err);
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#991b1b;padding:40px;">加载失败，请稍后重试</td></tr>';
    }
}
</script>
</body>
</html>
