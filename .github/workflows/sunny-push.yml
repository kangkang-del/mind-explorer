name: 心灵晴天 · 每日自动推送

# 与 netlify/functions/sunny-push.js 配合：
# 每日北京时间 08:00（= UTC 00:00）调用已部署站点的 sunny-push 函数，
# 拉取治愈图源 + 文案，写入 Supabase community_posts（幂等，当天仅一次）。
# 前端「今日精选 / 心灵晴天」打开时也会兜底懒触发，本任务用于保证无人访问时也有内容。

on:
  schedule:
    - cron: '0 0 * * *'        # UTC 00:00 = 北京时间 08:00
  workflow_dispatch: {}        # 允许在 Actions 页面手动触发调试

permissions:
  contents: read

jobs:
  sunny-push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 触发 sunny-push 函数
        env:
          SITE_URL: ${{ secrets.SITE_URL }}   # 例如 https://mind-explorer.netlify.app
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "::warning::未配置 secrets.SITE_URL，跳过每日推送。请到仓库 Settings → Secrets 添加 SITE_URL（部署后的站点地址，不含末尾斜杠）。"
            exit 0
          fi
          echo "POST $SITE_URL/.netlify/functions/sunny-push"
          curl -fsS -X POST "$SITE_URL/.netlify/functions/sunny-push" \
            -H "Content-Type: application/json" \
            -d '{}' \
            && echo "✅ 推送请求已发出" \
            || echo "⚠️ 推送请求失败（可忽略：前端会兜底触发，或稍后手动重试）"
